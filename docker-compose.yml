services:

  # ── 1. Kafka (avec Zookeeper intégré via image simplifiée) ──
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"   # crée wind-data automatiquement
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── 2. Weather Exporter (Producteur) ────────────────────────
  weather-exporter:
    build: ./weather-exporter
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8000:8000"       # métriques Prometheus
    environment:
      OWM_API_KEY: ${OWM_API_KEY}   # lu depuis le fichier .env
      CITY: Cotonou
      SCRAPE_INTERVAL: "30"
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: wind-data

  # ── 3. Kafka Consumer ────────────────────────────────────────
  kafka-consumer:
    build: ./kafka-consumer
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8001:8001"       # métriques Prometheus
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: wind-data
      WIND_ALERT_THRESHOLD: "15.0" #15.0

  # ── 4. Prometheus ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - weather-exporter
      - kafka-consumer

  # ── 5. Grafana ───���───────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    ports:
      - "3000:3000"       # interface web → http://localhost:3000
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin   # mot de passe par défaut
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  grafana-data:           # stockage persistant des dashboards