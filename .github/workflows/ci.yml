name: CI — Build & Push Docker Images

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  test:
    name: 🧪 Tests Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installation des dépendances
        run: |
          pip install -r weather-exporter/requirements.txt

      - name: Vérification syntaxe
        run: |
          python -c "import ast; ast.parse(open('weather-exporter/weather_exporter.py').read())"
          python -c "import ast; ast.parse(open('kafka-consumer/consumer.py').read())"
          echo "✅ Syntaxe Python OK"

  build-weather-exporter:
    name: 🐳 Build weather-exporter
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./weather-exporter
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/weather-exporter:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/weather-exporter:${{ github.sha }}

  build-kafka-consumer:
    name: 🐳 Build kafka-consumer
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./kafka-consumer
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/kafka-consumer:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/kafka-consumer:${{ github.sha }}

  notify:
    name: ✅ Résumé
    runs-on: ubuntu-latest
    needs: [build-weather-exporter, build-kafka-consumer]
    steps:
      - name: Résumé
        run: |
          echo "🎉 Pipeline CI/CD terminé !"
          echo "  → ${{ secrets.DOCKERHUB_USERNAME }}/weather-exporter:${{ github.sha }}"
          echo "  → ${{ secrets.DOCKERHUB_USERNAME }}/kafka-consumer:${{ github.sha }}"