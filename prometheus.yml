global:
  scrape_interval: 15s      # scrape toutes les 15 secondes

scrape_configs:
  # Scrape le weather-exporter (producteur)
  - job_name: "weather-exporter"
    static_configs:
      - targets: ["weather-exporter:8000"]

  # Scrape le kafka-consumer
  - job_name: "kafka-consumer"
    static_configs:
      - targets: ["kafka-consumer:8001"]